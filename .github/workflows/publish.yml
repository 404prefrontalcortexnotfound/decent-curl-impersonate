name: Publish npm package

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  test:
    uses: ./.github/workflows/ci.yml

  publish:
    name: Publish with npm trusted publishing
    needs: test
    runs-on: ubuntu-24.04
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: npm install --global npm@11.16.0
      - run: npm ci
      - name: Require exact tag and package version match
        run: node -e 'const p=require("./package.json"); if (process.env.GITHUB_REF_NAME !== `v${p.version}`) { throw new Error(`tag ${process.env.GITHUB_REF_NAME} does not match package ${p.version}`); }'
      - run: bun run typecheck
      - run: bun run build
      - name: Verify npm package contents
        run: |
          npm pack --dry-run --json > "$RUNNER_TEMP/decent-curl-pack.json"
          node scripts/verify-package.mjs "$RUNNER_TEMP/decent-curl-pack.json"
      - name: Publish with provenance through npm OIDC
        run: npm publish --access public --provenance
