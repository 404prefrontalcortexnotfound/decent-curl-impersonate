name: CI

on:
  push:
  pull_request:
  workflow_call:

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: astral-sh/setup-uv@v7
        with:
          version: 0.11.17
          python-version: "3.13"
          enable-cache: true
      - run: npm ci
      - run: uv sync --frozen --python 3.13
      - run: uv run pytest python/tests -q
      - run: bun test
      - run: bun run typecheck
      - run: bun run build
      - name: Verify npm package contents
        shell: bash
        run: |
          npm pack --dry-run --json > "$RUNNER_TEMP/decent-curl-pack.json"
          node scripts/verify-package.mjs "$RUNNER_TEMP/decent-curl-pack.json"
